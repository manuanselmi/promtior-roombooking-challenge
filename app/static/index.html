<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoomBooking — Cubo Itaú</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    :root {
      --accent: #4f46e5;
      --accent-dark: #4338ca;
      --ink: #1e1b4b;
      --muted: #64748b;
      --line: #e2e8f0;
      --danger: #dc2626;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 55%, #eff6ff 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 1.25rem;
    }
    .hidden { display: none !important; }

    .card {
      background: #fff; border: 1px solid var(--line); border-radius: 18px;
      box-shadow: 0 20px 45px -20px rgba(79, 70, 229, .25);
      width: 100%;
    }

    .brand { display: flex; align-items: center; gap: .7rem; }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 12px; flex: none;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; font-weight: 700; font-size: .95rem;
      display: flex; align-items: center; justify-content: center;
      letter-spacing: .02em;
    }
    .brand h1 { font-size: 1.1rem; line-height: 1.2; }
    .brand p { color: var(--muted); font-size: .8rem; }

    /* ---------- Login view ---------- */
    #login-view .card { max-width: 400px; padding: 2rem; }
    #login-view form { margin-top: 1.5rem; }
    label { display: block; font-size: .8rem; font-weight: 500; color: #334155; margin: .9rem 0 .3rem; }
    input {
      width: 100%; padding: .6rem .75rem; font-size: .95rem; color: var(--ink);
      border: 1px solid #cbd5e1; border-radius: 10px; outline: none; background: #f8fafc;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, .15); }
    .btn {
      background: var(--accent); color: #fff; border: 0; border-radius: 10px;
      padding: .6rem 1.2rem; font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn:hover { background: var(--accent-dark); }
    .btn:disabled { opacity: .5; cursor: default; }
    #login-view .btn { width: 100%; margin-top: 1.4rem; }
    .hint { color: var(--muted); font-size: .78rem; text-align: center; margin-top: 1rem; }
    .error { color: var(--danger); font-size: .84rem; margin-top: .8rem; min-height: 1.2em; text-align: center; }

    /* ---------- Chat view ---------- */
    #chat-view .card {
      max-width: 720px; height: min(86vh, 780px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--line); background: #fff;
    }
    .chat-header .brand p strong { color: #334155; }
    .btn-ghost {
      background: #fff; color: #475569; border: 1px solid #cbd5e1; border-radius: 10px;
      padding: .45rem .9rem; font-size: .82rem; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-ghost:hover { background: #f1f5f9; }

    #messages {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: .65rem; background: #f8fafc;
    }
    .msg {
      max-width: 82%; padding: .6rem .85rem; border-radius: 14px;
      font-size: .92rem; line-height: 1.45; white-space: pre-wrap; overflow-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end; color: #fff; border-bottom-right-radius: 4px;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
    }
    .msg.bot {
      align-self: flex-start; background: #fff; border: 1px solid var(--line);
      border-bottom-left-radius: 4px;
    }
    .msg.error-msg { border-color: #fecaca; background: #fef2f2; color: var(--danger); }

    .typing { display: inline-flex; gap: 4px; padding: .35rem 0; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #94a3b8;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: none; opacity: .5; } 30% { transform: translateY(-4px); opacity: 1; } }

    #suggestions {
      display: flex; gap: .5rem; flex-wrap: wrap;
      padding: 0 1.25rem .75rem; background: #f8fafc;
    }
    .chip {
      background: #fff; border: 1px solid #c7d2fe; color: var(--accent-dark);
      border-radius: 999px; padding: .35rem .8rem; font-size: .8rem; cursor: pointer;
      transition: background .15s;
    }
    .chip:hover { background: #eef2ff; }

    .composer {
      display: flex; gap: .6rem; padding: .9rem 1.25rem;
      border-top: 1px solid var(--line); background: #fff;
    }
    .composer input { flex: 1; }
    .composer .btn { display: flex; align-items: center; gap: .4rem; }

    @media (max-width: 560px) {
      body { padding: .5rem; }
      #chat-view .card { height: 94vh; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>

  <!-- ======== Login view ======== -->
  <div id="login-view">
    <div class="card">
      <div class="brand">
        <div class="brand-mark">RB</div>
        <div>
          <h1>RoomBooking</h1>
          <p>Meeting-room assistant — Cubo Itaú office</p>
        </div>
      </div>
      <form id="login-form">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" placeholder="User1" required />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <button type="submit" class="btn" id="login-btn">Log in</button>
        <p class="error" id="login-error"></p>
      </form>
      <p class="hint">Demo users: <strong>User1</strong> and <strong>User2</strong></p>
    </div>
  </div>

  <!-- ======== Chat view ======== -->
  <div id="chat-view" class="hidden">
    <div class="card">
      <div class="chat-header">
        <div class="brand">
          <div class="brand-mark">RB</div>
          <div>
            <h1>RoomBooking</h1>
            <p>Logged in as <strong id="who"></strong></p>
          </div>
        </div>
        <button class="btn-ghost" id="logout">Log out</button>
      </div>
      <div id="messages"></div>
      <div id="suggestions">
        <button class="chip">Which rooms are free tomorrow 10:00–11:00?</button>
        <button class="chip">Book room B tomorrow 10:00–11:00 for 3 people, title "Team sync"</button>
        <button class="chip">Show my bookings</button>
      </div>
      <form class="composer" id="chat-form">
        <input id="message" placeholder="Ask me to book, check or cancel a room…" autocomplete="off" required />
        <button type="submit" class="btn" id="send">Send</button>
      </form>
    </div>
  </div>

  <script>
    // The token lives only in memory: refreshing the page means logging in
    // again, consistent with the server's volatile per-login conversation.
    let token = null;

    const $ = (id) => document.getElementById(id);

    function show(view) {
      $("login-view").classList.toggle("hidden", view !== "login");
      $("chat-view").classList.toggle("hidden", view !== "chat");
    }

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      $("messages").appendChild(div);
      $("messages").scrollTop = $("messages").scrollHeight;
      return div;
    }

    function addTyping() {
      const div = addMessage("", "bot");
      div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      return div;
    }

    function backToLogin(message) {
      token = null;
      $("password").value = "";
      $("login-error").textContent = message || "";
      show("login");
    }

    // ---------- Login ----------
    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("login-error").textContent = "";
      $("login-btn").disabled = true;
      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: $("username").value.trim(),
            password: $("password").value,
          }),
        });
        if (!res.ok) {
          $("login-error").textContent =
            res.status === 401 ? "Invalid username or password." : "Login failed, please try again.";
          return;
        }
        const data = await res.json();
        token = data.token;
        $("who").textContent = data.username;
        $("messages").innerHTML = "";
        $("suggestions").classList.remove("hidden");
        addMessage(
          "Hi " + data.username + "! I can book meeting rooms, check availability, " +
          "show schedules and cancel your bookings. How can I help?",
          "bot"
        );
        show("chat");
        $("message").focus();
      } catch {
        $("login-error").textContent = "Network error, please try again.";
      } finally {
        $("login-btn").disabled = false;
      }
    });

    $("logout").addEventListener("click", () => backToLogin());

    // ---------- Chat ----------
    async function sendMessage(text) {
      if (!token) return;
      $("suggestions").classList.add("hidden");
      addMessage(text, "user");
      $("send").disabled = true;
      $("message").disabled = true;
      const typing = addTyping();
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({ message: text }),
        });
        if (res.status === 401) {
          typing.remove();
          backToLogin("Session expired, please log in again.");
          return;
        }
        const data = await res.json();
        typing.textContent = res.ok ? data.reply : (data.detail || "Something went wrong.");
        if (!res.ok) typing.classList.add("error-msg");
      } catch {
        typing.textContent = "Network error, please try again.";
        typing.classList.add("error-msg");
      } finally {
        $("send").disabled = false;
        $("message").disabled = false;
        $("message").focus();
      }
    }

    $("chat-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const text = $("message").value.trim();
      if (!text) return;
      $("message").value = "";
      sendMessage(text);
    });

    document.querySelectorAll(".chip").forEach((chip) =>
      chip.addEventListener("click", () => sendMessage(chip.textContent))
    );
  </script>
</body>
</html>
