<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoomBooking — Cubo Itaú</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f3f4f6; color: #111827;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 1rem;
    }
    .card {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
      width: 100%; max-width: 640px; padding: 1.5rem;
    }
    h1 { font-size: 1.15rem; margin-bottom: .25rem; }
    .subtitle { color: #6b7280; font-size: .85rem; margin-bottom: 1.25rem; }
    label { display: block; font-size: .8rem; color: #374151; margin: .75rem 0 .25rem; }
    input {
      width: 100%; padding: .55rem .7rem; font-size: .95rem;
      border: 1px solid #d1d5db; border-radius: 8px; outline: none;
    }
    input:focus { border-color: #2563eb; }
    button {
      background: #2563eb; color: #fff; border: 0; border-radius: 8px;
      padding: .55rem 1.1rem; font-size: .95rem; cursor: pointer; margin-top: 1rem;
    }
    button:disabled { opacity: .5; cursor: default; }
    .error { color: #dc2626; font-size: .85rem; margin-top: .75rem; min-height: 1.1em; }
    .hidden { display: none; }

    /* Chat */
    #chat-view { display: flex; flex-direction: column; height: 80vh; max-height: 700px; }
    .chat-header {
      display: flex; justify-content: space-between; align-items: baseline;
      padding-bottom: .75rem; border-bottom: 1px solid #e5e7eb;
    }
    .chat-header button { margin: 0; background: #e5e7eb; color: #374151; padding: .35rem .8rem; font-size: .8rem; }
    #messages { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: .6rem; }
    .msg { max-width: 85%; padding: .55rem .8rem; border-radius: 10px; font-size: .92rem; white-space: pre-wrap; line-height: 1.4; }
    .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 3px; }
    .msg.bot { align-self: flex-start; background: #f3f4f6; border-bottom-left-radius: 3px; }
    .msg.typing { color: #6b7280; font-style: italic; }
    .composer { display: flex; gap: .5rem; padding-top: .75rem; border-top: 1px solid #e5e7eb; }
    .composer input { flex: 1; }
    .composer button { margin: 0; }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="card" id="login-view">
    <h1>RoomBooking</h1>
    <p class="subtitle">Meeting-room assistant — Cubo Itaú office</p>
    <form id="login-form">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button type="submit">Log in</button>
      <p class="error" id="login-error"></p>
    </form>
  </div>

  <!-- Chat -->
  <div class="card hidden" id="chat-view">
    <div class="chat-header">
      <div>
        <h1>RoomBooking</h1>
        <p class="subtitle" style="margin:0">Logged in as <strong id="who"></strong></p>
      </div>
      <button id="logout">Log out</button>
    </div>
    <div id="messages"></div>
    <form class="composer" id="chat-form">
      <input id="message" placeholder="e.g. Book room B tomorrow 10:00-11:00 for 3 people" autocomplete="off" required />
      <button type="submit" id="send">Send</button>
    </form>
  </div>

  <script>
    // Token lives only in memory: a page refresh means logging in again,
    // consistent with the server's volatile per-login conversation memory.
    let token = null;

    const $ = (id) => document.getElementById(id);

    function show(view) {
      $("login-view").classList.toggle("hidden", view !== "login");
      $("chat-view").classList.toggle("hidden", view !== "chat");
    }

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      $("messages").appendChild(div);
      $("messages").scrollTop = $("messages").scrollHeight;
      return div;
    }

    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("login-error").textContent = "";
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: $("username").value.trim(), password: $("password").value }),
      });
      if (!res.ok) {
        $("login-error").textContent = res.status === 401 ? "Invalid username or password." : "Login failed, try again.";
        return;
      }
      const data = await res.json();
      token = data.token;
      $("who").textContent = data.username;
      $("messages").innerHTML = "";
      addMessage("Hi " + data.username + "! I can book meeting rooms, check availability and cancel your bookings. How can I help?", "bot");
      show("chat");
      $("message").focus();
    });

    $("logout").addEventListener("click", () => {
      token = null;
      $("password").value = "";
      show("login");
    });

    $("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = $("message").value.trim();
      if (!text) return;
      addMessage(text, "user");
      $("message").value = "";
      $("send").disabled = true;
      const typing = addMessage("…", "bot typing");
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({ message: text }),
        });
        if (res.status === 401) {  // expired session
          show("login");
          $("login-error").textContent = "Session expired, please log in again.";
          return;
        }
        const data = await res.json();
        typing.textContent = res.ok ? data.reply : (data.detail || "Something went wrong.");
        typing.classList.remove("typing");
      } catch {
        typing.textContent = "Network error, please try again.";
        typing.classList.remove("typing");
      } finally {
        $("send").disabled = false;
        $("message").focus();
      }
    });
  </script>
</body>
</html>
