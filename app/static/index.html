<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoomBooking — Cubo Itaú</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    :root {
      --bg: #0b0f14;
      --surface: #121820;
      --surface-2: #1a222c;
      --surface-3: #212b37;
      --border: #263140;
      --border-soft: #1b232e;
      --text: #e6edf3;
      --muted: #8b98a5;
      --faint: #5b6672;
      --accent: #2dd4bf;
      --accent-strong: #14b8a6;
      --accent-ink: #04141a;
      --accent-soft: rgba(45, 212, 191, .14);
      --accent-line: rgba(45, 212, 191, .5);
      --danger: #f87171;
      --shadow: 0 24px 60px -30px rgba(0, 0, 0, .85);
      color-scheme: dark;
    }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1000px 560px at 84% -10%, rgba(45, 212, 191, .08), transparent 58%),
        radial-gradient(760px 480px at 8% 108%, rgba(8, 145, 178, .08), transparent 60%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      padding: 1.25rem;
    }
    button { font: inherit; color: inherit; }
    .hidden { display: none !important; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
      box-shadow: var(--shadow); width: 100%;
    }

    .brand { display: flex; align-items: center; gap: .75rem; }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 12px; flex: none;
      background: linear-gradient(150deg, var(--accent), #0891b2);
      color: var(--accent-ink); font-weight: 800; font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 22px -12px rgba(45, 212, 191, .8);
    }
    .brand h1 { font-size: 1.08rem; line-height: 1.2; font-weight: 650; letter-spacing: -.01em; }
    .brand p { color: var(--muted); font-size: .8rem; }
    .brand p strong { color: var(--accent); font-weight: 600; }

    /* ---------- Login view ---------- */
    #login-view .card { max-width: 400px; padding: 2rem; }
    #login-view form { margin-top: 1.5rem; }
    label { display: block; font-size: .78rem; font-weight: 550; color: var(--muted); margin: .9rem 0 .35rem; }
    input {
      width: 100%; padding: .62rem .8rem; font-size: .95rem; color: var(--text);
      border: 1px solid var(--border); border-radius: 11px; outline: none; background: var(--bg);
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    input::placeholder { color: var(--faint); }
    input:focus { border-color: var(--accent-line); background: var(--surface-2); box-shadow: 0 0 0 3px var(--accent-soft); }
    .btn {
      background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 11px;
      padding: .62rem 1.2rem; font-size: .92rem; font-weight: 650; cursor: pointer;
      transition: background .15s, transform .05s;
    }
    .btn:hover { background: var(--accent-strong); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: .5; cursor: default; }
    #login-view .btn { width: 100%; margin-top: 1.5rem; }
    .hint { color: var(--muted); font-size: .78rem; text-align: center; margin-top: 1.1rem; }
    .hint code {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
      padding: .05rem .35rem; font-size: .74rem; color: var(--text);
    }
    .error { color: var(--danger); font-size: .84rem; margin-top: .8rem; min-height: 1.2em; text-align: center; }
    .foot-link {
      margin-top: 1.4rem; padding-top: 1.1rem; border-top: 1px solid var(--border-soft);
      text-align: center;
    }
    .foot-link a {
      color: var(--muted); font-size: .8rem; text-decoration: none; font-weight: 500;
      transition: color .15s;
    }
    .foot-link a:hover { color: var(--accent); }

    /* ---------- Chat view ---------- */
    #chat-view .card {
      max-width: 720px; height: min(86vh, 780px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface-2);
    }
    .btn-ghost {
      background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-radius: 10px;
      padding: .45rem .9rem; font-size: .82rem; font-weight: 500; cursor: pointer;
      transition: all .15s;
    }
    .btn-ghost:hover { background: var(--surface-3); color: var(--text); }

    #messages {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: .65rem; background: var(--bg);
    }
    .msg {
      max-width: 82%; padding: .62rem .9rem; border-radius: 15px;
      font-size: .92rem; line-height: 1.5; white-space: pre-wrap; overflow-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end; color: var(--accent-ink); border-bottom-right-radius: 5px;
      background: linear-gradient(150deg, var(--accent), var(--accent-strong)); font-weight: 500;
    }
    .msg.bot {
      align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border);
      border-bottom-left-radius: 5px; color: var(--text);
    }
    .msg.error-msg { border-color: rgba(248, 113, 113, .4); background: rgba(248, 113, 113, .1); color: var(--danger); }

    /* Markdown-rendered bot messages */
    .msg.md { white-space: normal; }
    .msg.md > :first-child { margin-top: 0; }
    .msg.md > :last-child { margin-bottom: 0; }
    .msg.md p { margin: 0; }
    .msg.md p + p { margin-top: .55rem; }
    .msg.md ul, .msg.md ol { margin: .4rem 0; padding-left: 1.3rem; }
    .msg.md li { margin: .12rem 0; }
    .msg.md li::marker { color: var(--muted); }
    .msg.md strong { font-weight: 650; color: #f3f7fa; }
    .msg.md em { font-style: italic; }
    .msg.md h3, .msg.md h4, .msg.md h5 { margin: .5rem 0 .25rem; line-height: 1.3; font-weight: 650; }
    .msg.md h3 { font-size: 1rem; }
    .msg.md h4 { font-size: .95rem; }
    .msg.md h5 { font-size: .9rem; }
    .msg.md code {
      background: var(--surface-3); border: 1px solid var(--border); border-radius: 5px;
      padding: .05rem .32rem; font-size: .85em; font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }
    .msg.md a { color: var(--accent); text-underline-offset: 2px; }

    .typing { display: inline-flex; gap: 4px; padding: .35rem 0; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: none; opacity: .45; } 30% { transform: translateY(-4px); opacity: 1; } }

    #suggestions {
      display: flex; gap: .5rem; flex-wrap: wrap;
      padding: 0 1.25rem .8rem; background: var(--bg);
    }
    .chip {
      background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
      border-radius: 999px; padding: .4rem .85rem; font-size: .8rem; cursor: pointer;
      transition: all .15s;
    }
    .chip:hover { background: var(--accent-soft); border-color: var(--accent-line); color: var(--accent); }

    .composer {
      display: flex; gap: .6rem; padding: .9rem 1.25rem;
      border-top: 1px solid var(--border); background: var(--surface-2);
    }
    .composer input { flex: 1; background: var(--bg); }
    .composer .btn { display: flex; align-items: center; gap: .4rem; }

    @media (max-width: 560px) {
      body { padding: .5rem; }
      #chat-view .card { height: 94vh; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>

  <!-- ======== Login view ======== -->
  <div id="login-view">
    <div class="card">
      <div class="brand">
        <div class="brand-mark">RB</div>
        <div>
          <h1>RoomBooking</h1>
          <p>Meeting-room assistant — Cubo Itaú office</p>
        </div>
      </div>
      <form id="login-form">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" placeholder="User1" required />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <button type="submit" class="btn" id="login-btn">Log in</button>
        <p class="error" id="login-error"></p>
      </form>
      <p class="hint">Demo users: <code>User1</code> and <code>User2</code></p>
      <div class="foot-link"><a href="/backoffice">View booking calendar (backoffice) &rarr;</a></div>
    </div>
  </div>

  <!-- ======== Chat view ======== -->
  <div id="chat-view" class="hidden">
    <div class="card">
      <div class="chat-header">
        <div class="brand">
          <div class="brand-mark">RB</div>
          <div>
            <h1>RoomBooking</h1>
            <p>Logged in as <strong id="who"></strong></p>
          </div>
        </div>
        <button class="btn-ghost" id="logout">Log out</button>
      </div>
      <div id="messages"></div>
      <div id="suggestions">
        <button class="chip">Which rooms are free tomorrow 10:00–11:00?</button>
        <button class="chip">Book room B tomorrow 10:00–11:00 for 3 people, title "Team sync"</button>
        <button class="chip">Show my bookings</button>
      </div>
      <form class="composer" id="chat-form">
        <input id="message" placeholder="Ask me to book, check or cancel a room…" autocomplete="off" required />
        <button type="submit" class="btn" id="send">Send</button>
      </form>
    </div>
  </div>

  <script>
    // The token lives only in memory: refreshing the page means logging in
    // again, consistent with the server's volatile per-login conversation.
    let token = null;

    const $ = (id) => document.getElementById(id);

    // ---------- Minimal, safe Markdown for the assistant's replies ----------
    // Everything is HTML-escaped first, so only the tags we emit below can
    // appear; links are limited to http(s) so no javascript: URLs slip through.
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function mdInline(s) {
      return s
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/__(.+?)__/g, "<strong>$1</strong>")
        .replace(/(^|[\s(])\*(?!\s)(.+?)\*(?=[\s).,!?:;]|$)/g, "$1<em>$2</em>");
    }

    function renderMarkdown(text) {
      const lines = escapeHtml(text).replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let list = null;   // { tag: "ul"|"ol", items: [] }
      let para = [];

      const flushPara = () => {
        if (para.length) { out.push("<p>" + para.map(mdInline).join("<br>") + "</p>"); para = []; }
      };
      const flushList = () => {
        if (list) {
          out.push(`<${list.tag}>` + list.items.map((t) => "<li>" + mdInline(t) + "</li>").join("") + `</${list.tag}>`);
          list = null;
        }
      };

      for (const raw of lines) {
        const line = raw.replace(/\s+$/, "");
        const h = line.match(/^(#{1,3})\s+(.*)$/);
        const ul = line.match(/^\s*[-*]\s+(.*)$/);
        const ol = line.match(/^\s*\d+\.\s+(.*)$/);
        if (h) {
          flushPara(); flushList();
          out.push(`<h${h[1].length + 2}>` + mdInline(h[2]) + `</h${h[1].length + 2}>`);
        } else if (ul) {
          flushPara();
          if (!list || list.tag !== "ul") { flushList(); list = { tag: "ul", items: [] }; }
          list.items.push(ul[1]);
        } else if (ol) {
          flushPara();
          if (!list || list.tag !== "ol") { flushList(); list = { tag: "ol", items: [] }; }
          list.items.push(ol[1]);
        } else if (line.trim() === "") {
          flushPara(); flushList();
        } else {
          flushList();
          para.push(line);
        }
      }
      flushPara(); flushList();
      return out.join("");
    }

    function setBotContent(el, text) {
      el.classList.add("md");
      el.classList.remove("error-msg");
      el.innerHTML = renderMarkdown(text);
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function show(view) {
      $("login-view").classList.toggle("hidden", view !== "login");
      $("chat-view").classList.toggle("hidden", view !== "chat");
    }

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      if (cls === "bot") setBotContent(div, text);
      else div.textContent = text;
      $("messages").appendChild(div);
      $("messages").scrollTop = $("messages").scrollHeight;
      return div;
    }

    function addTyping() {
      const div = addMessage("", "bot");
      div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      return div;
    }

    function backToLogin(message) {
      token = null;
      $("password").value = "";
      $("login-error").textContent = message || "";
      show("login");
    }

    // ---------- Login ----------
    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      $("login-error").textContent = "";
      $("login-btn").disabled = true;
      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: $("username").value.trim(),
            password: $("password").value,
          }),
        });
        if (!res.ok) {
          $("login-error").textContent =
            res.status === 401 ? "Invalid username or password." : "Login failed, please try again.";
          return;
        }
        const data = await res.json();
        token = data.token;
        $("who").textContent = data.username;
        $("messages").innerHTML = "";
        $("suggestions").classList.remove("hidden");
        addMessage(
          "Hi " + data.username + "! I can book meeting rooms, check availability, " +
          "show schedules and cancel your bookings. How can I help?",
          "bot"
        );
        show("chat");
        $("message").focus();
      } catch {
        $("login-error").textContent = "Network error, please try again.";
      } finally {
        $("login-btn").disabled = false;
      }
    });

    $("logout").addEventListener("click", () => backToLogin());

    // ---------- Chat ----------
    async function sendMessage(text) {
      if (!token) return;
      $("suggestions").classList.add("hidden");
      addMessage(text, "user");
      $("send").disabled = true;
      $("message").disabled = true;
      const typing = addTyping();
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
          body: JSON.stringify({ message: text }),
        });
        if (res.status === 401) {
          typing.remove();
          backToLogin("Session expired, please log in again.");
          return;
        }
        const data = await res.json();
        if (res.ok) {
          setBotContent(typing, data.reply);
        } else {
          typing.classList.remove("md");
          typing.textContent = data.detail || "Something went wrong.";
          typing.classList.add("error-msg");
        }
      } catch {
        typing.classList.remove("md");
        typing.textContent = "Network error, please try again.";
        typing.classList.add("error-msg");
      } finally {
        $("send").disabled = false;
        $("message").disabled = false;
        $("message").focus();
      }
    }

    $("chat-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const text = $("message").value.trim();
      if (!text) return;
      $("message").value = "";
      sendMessage(text);
    });

    document.querySelectorAll(".chip").forEach((chip) =>
      chip.addEventListener("click", () => sendMessage(chip.textContent))
    );
  </script>
</body>
</html>
